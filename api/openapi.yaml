      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, order_num]
              properties:
                name:
                  type: string
                  example: Анатомия мышц
                description:
                  type: string
                  nullable: true
                order_num:
                  type: integer
                  example: 2
                is_locked:
                  type: boolean
                  default: false
                icon_emoji:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Module created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

