        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 7. Admin ──────────────────────────────────────────────────────────────────
  /api/v1/admin/promo-codes:
    post:
      tags: [admin]
      operationId: adminCreatePromoCode
      summary: Create a new promo code
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, university_name, max_activations]
              properties:
                code:
                  type: string
                  example: ABC123
                university_name:
                  type: string
                  example: МГУ
                max_activations:
                  type: integer
                  minimum: 1
                  example: 50
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "201":
          description: Promo code created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/admin/promo-codes/{code}:
    delete:
      tags: [admin]
      operationId: adminDeactivatePromoCode
      summary: Deactivate a promo code
      security:
        - AdminAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Promo code deactivated
          content:
            application/json:
              schema:
                type: object
                required: [code, status, deactivated_at]
                properties:
                  code:
                    type: string
                  status:
                    type: string
                    example: deactivated
                  deactivated_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

