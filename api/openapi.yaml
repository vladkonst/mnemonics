        - name: subscription_status
          in: query
          schema:
            $ref: "#/components/schemas/SubscriptionStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                required: [users, total, limit, offset]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/admin/analytics/overview:
    get:
      tags: [admin]
      operationId: adminGetAnalytics
      summary: System analytics overview
      security:
        - AdminAuth: []
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
