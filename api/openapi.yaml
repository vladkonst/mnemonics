    put:
      tags: [admin]
      operationId: adminUpdateModule
      summary: Update a module (idempotent)
      security:
        - AdminAuth: []
      parameters:
        - $ref: "#/components/parameters/ModuleIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, order_num]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                order_num:
                  type: integer
                is_locked:
                  type: boolean
                icon_emoji:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Module updated
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: "#/components/schemas/Module"
                  - type: object
                    properties:
                      updated_at:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/content/themes:
    post:
      tags: [admin]
      operationId: adminCreateTheme
      summary: Create a theme in a module
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [module_id, name, order_num]
              properties:
                module_id:
                  type: integer
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                order_num:
                  type: integer
                is_introduction:
                  type: boolean
                  default: false
                is_locked:
                  type: boolean
                  default: false
                estimated_time_minutes:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: Theme created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

