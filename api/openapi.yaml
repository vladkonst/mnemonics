  # ── 4. Subscriptions & Promo Codes ───────────────────────────────────────────
  /api/v1/teachers/{teacher_id}/promo-codes:
    post:
      tags: [subscriptions]
      operationId: activatePromoCode
      summary: Activate a promo code (teacher claims it)
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/TeacherIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: ABC123
      responses:
        "200":
          description: Promo code activated
          content:
            application/json:
              schema:
                type: object
                required: [code, university_name, remaining_activations, max_activations]
                properties:
                  code:
                    type: string
                  university_name:
                    type: string
                  remaining_activations:
                    type: integer
                  max_activations:
                    type: integer
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      tags: [subscriptions]
      operationId: getTeacherPromoCodes
      summary: List teacher's promo codes
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/TeacherIdPath"
      responses:
        "200":
          description: List of promo codes
          content:
            application/json:
              schema:
                type: object
                required: [promo_codes, total]
                properties:
                  promo_codes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PromoCode"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{user_id}/subscriptions:
    post:
      tags: [subscriptions]
      operationId: createSubscription
      summary: Create subscription (promo code join or payment confirmation)
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                promo_code:
                  type: string
                  description: For university subscription via promo code
                  example: ABC123
                payment_id:
                  type: string
                  description: For personal subscription after payment
                  example: pay_abc123xyz
                plan:
                  type: string
                  enum: [monthly, yearly]
                  description: Required when using payment_id
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                type: object
                required: [subscription_id, type, status]
                properties:
                  subscription_id:
                    type: string
                  type:
                    type: string
                    enum: [personal, university]
                  status:
                    type: string
                    enum: [active]
                  plan:
                    type: string
                    nullable: true
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  university_name:
                    type: string
                    nullable: true
                  teacher_name:
                    type: string
                    nullable: true
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── 5. Payments ───────────────────────────────────────────────────────────────
  /api/v1/users/{user_id}/payment-invoices:
    post:
