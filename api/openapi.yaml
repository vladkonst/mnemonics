      operationId: createPaymentInvoice
      summary: Create a payment invoice for personal subscription
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [monthly, yearly]
      responses:
        "201":
          description: Invoice created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInvoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/users/{user_id}/payment-invoices/pending:
    get:
      tags: [payments]
      operationId: getPendingInvoice
      summary: Get pending payment invoice status
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: Pending invoice found
          content:
            application/json:
              schema:
                type: object
                required: [invoice_id, status, amount, created_at]
                properties:
                  invoice_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, success, failed]
                  payment_url:
                    type: string
                    nullable: true
                  amount:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/webhooks/payment-gateway:
    post:
      tags: [payments]
      operationId: handlePaymentWebhook
      summary: Handle payment gateway webhook
      description: Always returns 200 OK for idempotency. Verifies webhook signature.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, status, user_id, amount, currency, signature]
              properties:
                payment_id:
                  type: string
                status:
                  type: string
                  enum: [success, failed, pending]
                user_id:
                  type: integer
                  format: int64
                amount:
                  type: integer
                currency:
                  type: string
                metadata:
                  type: object
                  properties:
                    plan:
                      type: string
                signature:
                  type: string
      responses:
        "200":
          description: Webhook received (always 200)
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── 6. Teacher Features ───────────────────────────────────────────────────────
  /api/v1/teachers/{teacher_id}/students:
