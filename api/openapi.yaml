    post:
      tags: [admin]
      operationId: adminCreateMnemonic
      summary: Create a mnemonic for a theme
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [theme_id, type, order_num]
              properties:
                theme_id:
                  type: integer
                type:
                  type: string
                  enum: [text, image]
                content_text:
                  type: string
                  nullable: true
                s3_image_key:
                  type: string
                  nullable: true
                order_num:
                  type: integer
      responses:
        "201":
          description: Mnemonic created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mnemonic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/content/tests:
    post:
      tags: [admin]
      operationId: adminCreateTest
      summary: Create a test for a theme
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [theme_id, passing_score, questions]
              properties:
                theme_id:
                  type: integer
                difficulty:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 1
                passing_score:
                  type: integer
                  minimum: 0
                  maximum: 100
                  default: 70
                shuffle_questions:
                  type: boolean
                  default: true
                shuffle_answers:
                  type: boolean
                  default: true
                questions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [question, type, options, correct_answer, order_num]
                    properties:
                      question:
                        type: string
                      type:
                        type: string
                        enum: [multiple_choice, true_false]
                      options:
                        type: array
                        items:
                          type: string
                      correct_answer:
                        type: string
                      order_num:
                        type: integer
      responses:
        "201":
          description: Test created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [id, theme_id, difficulty, passing_score, total_questions, created_at]
                properties:
                  id:
                    type: integer
                  theme_id:
                    type: integer
                  difficulty:
                    type: integer
                  passing_score:
                    type: integer
                  total_questions:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

