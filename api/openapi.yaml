      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [theme_id]
              properties:
                theme_id:
                  type: integer
                  example: 2
      responses:
        "201":
          description: Test attempt created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestAttempt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{user_id}/test-attempts/{attempt_id}:
    put:
      tags: [content]
      operationId: submitTestAttempt
      summary: Submit test answers (idempotent)
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - name: attempt_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    $ref: "#/components/schemas/AnswerItem"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result:
                    $ref: "#/components/schemas/TestResult"
                  next_action:
                    $ref: "#/components/schemas/NextAction"
                  motivation_message:
                    type: string
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/{user_id}/theme/{theme_id}/access:
    get:
      tags: [content]
      operationId: checkThemeAccess
      summary: Check if user can access a specific theme
      security:
        - TelegramAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/ThemeIdPath"
      responses:
        "200":
          description: Access check result
          content:
            application/json:
              schema:
                type: object
                required: [accessible]
                properties:
                  accessible:
                    type: boolean
                  access_type:
                    type: string
                    enum: [subscription, sequential]
                    nullable: true
                  reason:
                    type: string
                    nullable: true
                    example: previous_theme_required
                  required_theme_id:
                    type: integer
                    nullable: true
                  required_theme_name:
                    type: string
                    nullable: true
                  required_action:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── 3. Progress ───────────────────────────────────────────────────────────────
  /api/v1/users/{user_id}/progress:
