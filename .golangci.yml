version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/vladkonst/mnemonics
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
