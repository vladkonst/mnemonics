services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/mnemo.db

  admin:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - server

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    volumes:
      - ./api/openapi.yaml:/usr/share/nginx/html/openapi.yaml
    environment:
      SWAGGER_JSON_URL: /openapi.yaml
