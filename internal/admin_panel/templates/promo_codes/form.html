{{template "base.html" .}}
{{define "title"}}Новый промокод — Mnemo Admin{{end}}
{{define "content"}}
<div class="d-flex align-items-center mb-3">
  <a href="/admin/promo-codes" class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-arrow-left"></i></a>
  <h4 class="mb-0">Новый промокод</h4>
</div>
<div class="card p-4" style="max-width:500px">
  <form method="POST" action="/admin/promo-codes/new">
    <div class="mb-3">
      <label class="form-label">Код *</label>
      <input type="text" name="code" class="form-control font-monospace" placeholder="UNIV2025" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Университет</label>
      <input type="text" name="university_name" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Максимум активаций *</label>
      <input type="number" name="max_activations" class="form-control" min="1" value="30" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Истекает (необязательно)</label>
      <input type="datetime-local" name="expires_at" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Создать</button>
  </form>
</div>
{{end}}
