<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mnemo Admin — Вход</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>body{background:#f4f6f9;} .login-box{max-width:360px;margin:80px auto;}</style>
</head>
<body>
<div class="login-box">
  <div class="card p-4 shadow-sm">
    <h4 class="text-center mb-4">🧠 Mnemo Admin</h4>
    {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
    <form method="POST" action="/admin/login">
      <div class="mb-3">
        <label class="form-label">Токен администратора</label>
        <input type="password" name="token" class="form-control" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
